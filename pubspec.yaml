name: nyutji_laundry_mobile
description: Aplikasi Mobile Nyutji Laundry dengan desain retro Neo-Brutalism.

publish_to: 'none' # Menahan rilis ke pub.dev secara tidak sengaja

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  http: ^1.1.0
  webview_flutter: ^4.2.2
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  dio: ^5.4.1
  lucide_icons: ^0.257.0
  url_launcher: ^6.2.5
  google_maps_flutter: ^2.5.3
  geolocator: ^9.0.2
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/google_fonts/
